<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Live Market Scanner</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@400;600;700&display=swap" rel="stylesheet"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:#07070f;color:#e0e0e0;font-family:'DM Sans',sans-serif}
    @keyframes spin{to{transform:rotate(360deg)}}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
    ::-webkit-scrollbar{width:5px;height:5px}
    ::-webkit-scrollbar-track{background:#0a0a12}
    ::-webkit-scrollbar-thumb{background:#1e1e2e;border-radius:3px}
    select option{background:#12121e}
    .row:hover{background:rgba(0,255,150,.025)!important}
    .btn{border:none;cursor:pointer;font-family:'DM Sans',sans-serif}
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback, useMemo } = React;

// Same origin — no hardcoded URL needed
const API = "";
const REFRESH_MS = 300_000; // 5 min

const SECTOR_COLORS = {
  Technology:"#60a5fa",Consumer:"#f97316",Financials:"#22c55e",
  Healthcare:"#ec4899",Energy:"#eab308",Industrials:"#a78bfa",
  Communication:"#14b8a6",Materials:"#f59e0b","Real Estate":"#8b5cf6",
  Utilities:"#06b6d4",Crypto:"#fb923c",ETF:"#94a3b8",Unknown:"#888"
};

// ── formatters ───────────────────────────────────────────────
const fmtP = p => p==null?"—": p>=1000?"$"+p.toLocaleString("en-US",{maximumFractionDigits:0}):"$"+Number(p).toFixed(2);
const fmtV = v => v==null?"—": v>=1e9?(v/1e9).toFixed(2)+"B": v>=1e6?(v/1e6).toFixed(1)+"M":v.toLocaleString();
const fmtC = c => c==null?"—":(c>=0?"+":"")+Number(c).toFixed(2)+"%";

// ── atoms ────────────────────────────────────────────────────
const Spin = ({s=18}) => <div style={{width:s,height:s,border:"2px solid rgba(0,255,150,.12)",borderTop:"2px solid #00ff96",borderRadius:"50%",animation:"spin .8s linear infinite",display:"inline-block",flexShrink:0}}/>;

const TierBadge = ({tier}) => {
  const hi=tier==="HIGH";
  return <span style={{fontSize:9,fontWeight:800,padding:"2px 6px",borderRadius:3,
    background:hi?"rgba(255,199,0,.12)":"rgba(160,160,255,.1)",
    color:hi?"#ffc700":"#9090ff",
    border:`1px solid ${hi?"rgba(255,199,0,.28)":"rgba(160,160,255,.2)"}`,
    letterSpacing:".8px",whiteSpace:"nowrap"}}>{hi?"★ HIGH":"◈ AVG"}</span>;
};

const VwapBadge = ({above}) =>
  <span style={{fontSize:9,fontWeight:700,padding:"2px 6px",borderRadius:3,
    background:above?"rgba(0,255,150,.1)":"rgba(255,80,80,.1)",
    color:above?"#00ff96":"#ff5050",
    border:`1px solid ${above?"rgba(0,255,150,.2)":"rgba(255,80,80,.2)"}`,
    whiteSpace:"nowrap"}}>{above?"▲ ABOVE":"▼ BELOW"}</span>;

const Dot = ({sector}) =>
  <span style={{display:"inline-block",width:7,height:7,borderRadius:"50%",
    background:SECTOR_COLORS[sector]||"#888",flexShrink:0}}/>;

const Bar = ({v}) => {
  const c=Math.max(-7,Math.min(7,v||0)), w=Math.abs(c)/7*100, pos=v>=0;
  return <div style={{width:48,height:5,background:"rgba(255,255,255,.05)",borderRadius:3,overflow:"hidden",marginLeft:"auto"}}>
    <div style={{width:`${w}%`,height:"100%",borderRadius:3,background:pos?"#00ff96":"#ff5050",
      marginLeft:pos?"50%":`${50-w}%`,opacity:.8}}/>
  </div>;
};

const StatCard = ({icon,label,value,sub,accent}) =>
  <div style={{background:"rgba(255,255,255,.025)",border:"1px solid rgba(255,255,255,.06)",
    borderRadius:10,padding:"13px 16px",flex:1,minWidth:120}}>
    <div style={{fontSize:10,color:"#555",letterSpacing:"1px",marginBottom:4,textTransform:"uppercase",display:"flex",alignItems:"center",gap:5}}>{icon} {label}</div>
    <div style={{fontSize:19,fontFamily:"'Space Mono',monospace",fontWeight:700,color:accent||"#e0e0e0"}}>{value}</div>
    {sub&&<div style={{fontSize:10,color:"#444",marginTop:3}}>{sub}</div>}
  </div>;

// ── countdown to next refresh ────────────────────────────────
function Countdown({at}){
  const [s,setS]=useState(0);
  useEffect(()=>{
    const id=setInterval(()=>setS(Math.max(0,Math.round((at-Date.now())/1000))),1000);
    return()=>clearInterval(id);
  },[at]);
  const m=Math.floor(s/60), sec=s%60;
  return <span style={{fontFamily:"'Space Mono',monospace",color:"#444",fontSize:10}}>
    next refresh {m}:{sec.toString().padStart(2,"0")}
  </span>;
}

// ── stock row ─────────────────────────────────────────────────
function Row({s,rank}){
  const pos=s.change_pct>=0;
  const vs=s.vwap?(((s.price-s.vwap)/s.vwap)*100).toFixed(2):null;
  return(
    <tr className="row" style={{borderBottom:"1px solid rgba(255,255,255,.028)",transition:"background .1s"}}>
      <td style={{padding:"7px 10px",color:"#3a3a3a",fontSize:10,width:30}}>{rank}</td>
      <td style={{padding:"7px 10px"}}>
        <div style={{display:"flex",alignItems:"center",gap:6}}>
          <Dot sector={s.sector}/>
          <span style={{fontFamily:"'Space Mono',monospace",fontWeight:700,color:"#ddd",fontSize:13}}>{s.symbol}</span>
          <TierBadge tier={s.tier}/>
        </div>
        <div style={{fontSize:10,color:"#3a3a3a",marginTop:1,paddingLeft:13,maxWidth:180,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{s.name}</div>
      </td>
      <td style={{padding:"7px 10px",textAlign:"right",fontFamily:"'Space Mono',monospace",color:"#ccc",fontSize:12}}>{fmtP(s.price)}</td>
      <td style={{padding:"7px 10px",textAlign:"right"}}>
        <span style={{color:pos?"#00ff96":"#ff5050",fontFamily:"'Space Mono',monospace",fontWeight:700,fontSize:11}}>{fmtC(s.change_pct)}</span>
      </td>
      <td style={{padding:"7px 10px",textAlign:"right",fontFamily:"'Space Mono',monospace",color:"#777",fontSize:11}}>{fmtP(s.vwap)}</td>
      <td style={{padding:"7px 10px",textAlign:"right"}}>
        {vs!=null
          ? <span style={{fontFamily:"'Space Mono',monospace",fontSize:10,color:parseFloat(vs)>=0?"#00ff96":"#ff5050"}}>{parseFloat(vs)>=0?"+":""}{vs}%</span>
          : <span style={{color:"#444"}}>—</span>}
      </td>
      <td style={{padding:"7px 10px",textAlign:"right",fontFamily:"'Space Mono',monospace",color:"#666",fontSize:11}}>{fmtV(s.volume)}</td>
      <td style={{padding:"7px 10px",textAlign:"center"}}><VwapBadge above={s.above_vwap}/></td>
      <td style={{padding:"7px 10px",textAlign:"right",width:64}}><Bar v={s.change_pct}/></td>
    </tr>
  );
}

// ── sector heatmap ────────────────────────────────────────────
function Heatmap({sectors}){
  return(
    <div style={{display:"flex",gap:10,flexWrap:"wrap",marginBottom:22}}>
      {sectors.map(s=>{
        const pos=s.avg_change>=0;
        const intensity=Math.min(Math.abs(s.avg_change)/4,1);
        return(
          <div key={s.sector} style={{
            background:`rgba(${pos?"0,255,150":"255,80,80"},${intensity*.12})`,
            border:`1px solid rgba(${pos?"0,255,150":"255,80,80"},${intensity*.28})`,
            borderRadius:8,padding:"11px 14px",minWidth:120,flex:1}}>
            <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:4}}>
              <span style={{width:6,height:6,borderRadius:"50%",background:SECTOR_COLORS[s.sector]||"#888",display:"inline-block"}}/>
              <span style={{fontSize:10,color:"#888",fontWeight:600}}>{s.sector}</span>
            </div>
            <div style={{fontFamily:"'Space Mono',monospace",fontSize:17,fontWeight:700,color:pos?"#00ff96":"#ff5050"}}>{fmtC(s.avg_change)}</div>
            <div style={{fontSize:10,color:"#555",marginTop:2}}>{s.count} stocks · {s.above_vwap_pct}% ▲</div>
            <div style={{fontSize:10,color:"#444",marginTop:1}}>{fmtV(s.total_vol)}</div>
          </div>
        );
      })}
    </div>
  );
}

// ── main ─────────────────────────────────────────────────────
function App(){
  const [stocks,  setStocks]  = useState([]);
  const [sectors, setSectors] = useState([]);
  const [meta,    setMeta]    = useState({status:"loading",last_updated:null,fetch_count:0});
  const [loading, setLoading] = useState(false);
  const [err,     setErr]     = useState(null);
  const [view,    setView]    = useState("table");
  const [sector,  setSector]  = useState("All");
  const [tier,    setTier]    = useState("All");
  const [sig,     setSig]     = useState("all");
  const [search,  setSearch]  = useState("");
  const [sortK,   setSortK]   = useState("volume");
  const [sortD,   setSortD]   = useState("desc");
  const [page,    setPage]    = useState(1);
  const [nextAt,  setNextAt]  = useState(Date.now()+REFRESH_MS);
  const PAGE = 50;

  const load = useCallback(async()=>{
    setLoading(true); setErr(null);
    try{
      const [r1,r2] = await Promise.all([
        fetch(`${API}/api/stocks`),
        fetch(`${API}/api/sectors`),
      ]);
      if(!r1.ok) throw new Error(`HTTP ${r1.status}`);
      const d1=await r1.json(), d2=await r2.json();
      setStocks(d1.stocks||[]);
      setSectors(d2||[]);
      setMeta({status:d1.status,last_updated:d1.last_updated,fetch_count:d1.fetch_count});
      setNextAt(Date.now()+REFRESH_MS);
      setPage(1);
    }catch(e){
      setErr(e.message);
    }
    setLoading(false);
  },[]);

  useEffect(()=>{load();},[load]);
  useEffect(()=>{ const id=setInterval(load,REFRESH_MS); return()=>clearInterval(id); },[load]);

  const doSort = k => { if(sortK===k) setSortD(d=>d==="asc"?"desc":"asc"); else{setSortK(k);setSortD("desc");} };
  const SECS = useMemo(()=>["All",...new Set(stocks.map(s=>s.sector))],(stocks));

  const filtered = useMemo(()=>stocks
    .filter(s=>sector==="All"||s.sector===sector)
    .filter(s=>tier==="All"||s.tier===tier)
    .filter(s=>{
      if(sig==="above") return s.above_vwap;
      if(sig==="below") return !s.above_vwap;
      if(sig==="gainers") return s.change_pct>0;
      if(sig==="losers") return s.change_pct<0;
      return true;
    })
    .filter(s=>!search||s.symbol.includes(search.toUpperCase())||s.name.toLowerCase().includes(search.toLowerCase()))
    .sort((a,b)=>{
      if(sortK==="symbol") return sortD==="asc"?a.symbol.localeCompare(b.symbol):b.symbol.localeCompare(a.symbol);
      return sortD==="asc"?(a[sortK]??0)-(b[sortK]??0):(b[sortK]??0)-(a[sortK]??0);
    })
  ,[stocks,sector,tier,sig,search,sortK,sortD]);

  const paged    = filtered.slice((page-1)*PAGE,page*PAGE);
  const totalPgs = Math.ceil(filtered.length/PAGE);
  const gainers  = stocks.filter(s=>s.change_pct>0).length;
  const losers   = stocks.filter(s=>s.change_pct<0).length;
  const aboveV   = stocks.filter(s=>s.above_vwap).length;
  const totalVol = stocks.reduce((a,s)=>a+(s.volume||0),0);
  const avgChg   = stocks.length?(stocks.reduce((a,s)=>a+(s.change_pct||0),0)/stocks.length).toFixed(2):"—";
  const hiCnt    = stocks.filter(s=>s.tier==="HIGH").length;
  const avCnt    = stocks.filter(s=>s.tier==="AVG").length;

  const Th = ({label,k,align="right"}) =>
    <th onClick={()=>doSort(k)} style={{padding:"8px 10px",textAlign:align,fontSize:9,fontWeight:700,
      letterSpacing:"1px",color:sortK===k?"#00ff96":"#505050",cursor:"pointer",
      userSelect:"none",whiteSpace:"nowrap",textTransform:"uppercase"}}>
      {label}{sortK===k?(sortD==="asc"?" ↑":" ↓"):""}
    </th>;

  const Btn = ({active,accent,onClick,children}) =>
    <button className="btn" onClick={onClick} style={{
      background:active?`rgba(${accent||"0,255,150"},.1)`:"rgba(255,255,255,.028)",
      border:`1px solid rgba(${active?(accent||"0,255,150"):"255,255,255"},${active?.28:.07})`,
      color:active?`rgb(${accent||"0,255,150"})`:"#555",
      borderRadius:6,padding:"5px 12px",fontSize:11,fontWeight:active?700:400}}>{children}</button>;

  return(
    <div style={{minHeight:"100vh",padding:"22px 18px"}}>

      {/* ── header ── */}
      <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",marginBottom:20,flexWrap:"wrap",gap:12}}>
        <div>
          <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:4}}>
            <div style={{width:8,height:8,borderRadius:"50%",
              background:meta.status==="ok"?"#00ff96":meta.status==="error"?"#ff5050":"#ffc700",
              animation:"pulse 1.5s infinite"}}/>
            <h1 style={{margin:0,fontSize:21,fontWeight:700,letterSpacing:"-.5px",color:"#fff"}}>Live Market Scanner</h1>
            <span style={{fontSize:10,color:"#444",fontFamily:"'Space Mono',monospace",
              background:"rgba(255,255,255,.04)",border:"1px solid rgba(255,255,255,.08)",
              borderRadius:4,padding:"2px 8px"}}>yfinance · REAL · 5-min</span>
          </div>
          <p style={{margin:0,fontSize:11,color:"#444"}}>
            {meta.last_updated
              ? `Updated ${new Date(meta.last_updated).toLocaleTimeString()}`
              : meta.status==="initializing"?"First fetch in progress…":"Waiting…"}
            &nbsp;·&nbsp; ★ {hiCnt} High &nbsp;·&nbsp; ◈ {avCnt} Avg
            &nbsp;·&nbsp; <Countdown at={nextAt}/>
          </p>
        </div>
        <div style={{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}}>
          <button className="btn" onClick={load} disabled={loading} style={{
            background:"rgba(0,255,150,.09)",border:"1px solid rgba(0,255,150,.25)",
            color:"#00ff96",borderRadius:6,padding:"6px 16px",
            opacity:loading?.6:1,fontSize:11,fontWeight:700,
            display:"flex",alignItems:"center",gap:8}}>
            {loading?<><Spin s={13}/>Fetching…</>:"⟳ Refresh Now"}
          </button>
          {[["table","☰ Table"],["sectors","⬡ Sectors"]].map(([v,l])=>(
            <button key={v} className="btn" onClick={()=>setView(v)} style={{
              background:view===v?"rgba(255,255,255,.09)":"rgba(255,255,255,.025)",
              border:"1px solid rgba(255,255,255,.07)",
              color:view===v?"#ccc":"#505050",
              borderRadius:6,padding:"6px 12px",fontSize:11,fontWeight:view===v?700:400}}>{l}</button>
          ))}
        </div>
      </div>

      {/* ── error ── */}
      {err&&(
        <div style={{background:"rgba(255,80,80,.08)",border:"1px solid rgba(255,80,80,.25)",
          borderRadius:8,padding:"12px 16px",marginBottom:16,fontSize:12,color:"#ff8080"}}>
          ⚠️ API error: {err} — backend may still be initializing (first fetch takes ~2 min).
        </div>
      )}

      {/* ── stats ── */}
      <div style={{display:"flex",gap:10,marginBottom:18,flexWrap:"wrap"}}>
        <StatCard icon="📈" label="Avg Change" value={`${parseFloat(avgChg)>=0?"+":""}${avgChg}%`} accent={parseFloat(avgChg)>=0?"#00ff96":"#ff5050"} sub="Market mood"/>
        <StatCard icon="🟢" label="Gainers / Losers" value={`${gainers} / ${losers}`} sub={`${((gainers/(gainers+losers||1))*100).toFixed(0)}% bullish`}/>
        <StatCard icon="📊" label="Above VWAP" value={`${aboveV} / ${stocks.length}`} accent="#00ff96" sub="VWAP signal"/>
        <StatCard icon="🔊" label="Total Volume" value={fmtV(totalVol)} accent="#a78bfa" sub="All shares traded"/>
        <StatCard icon="★" label="High / Avg" value={`${hiCnt} / ${avCnt}`} accent="#ffc700" sub="Tier breakdown"/>
      </div>

      {/* ── heatmap ── */}
      {view==="sectors"&&<Heatmap sectors={sectors}/>}

      {/* ── filters ── */}
      <div style={{display:"flex",gap:7,marginBottom:12,alignItems:"center",flexWrap:"wrap"}}>
        <select value={sector} onChange={e=>{setSector(e.target.value);setPage(1);}}
          style={{background:"rgba(255,255,255,.04)",border:"1px solid rgba(255,255,255,.08)",
            borderRadius:6,padding:"5px 10px",color:"#999",fontSize:11,cursor:"pointer"}}>
          {SECS.map(s=><option key={s} value={s}>{s==="All"?"All Sectors":s}</option>)}
        </select>

        <Btn active={tier==="All"}   accent="255,199,0" onClick={()=>{setTier("All");  setPage(1);}}>All</Btn>
        <Btn active={tier==="HIGH"}  accent="255,199,0" onClick={()=>{setTier("HIGH"); setPage(1);}}>★ High</Btn>
        <Btn active={tier==="AVG"}   accent="255,199,0" onClick={()=>{setTier("AVG");  setPage(1);}}>◈ Avg</Btn>

        <Btn active={sig==="all"}     onClick={()=>{setSig("all");    setPage(1);}}>All</Btn>
        <Btn active={sig==="gainers"} onClick={()=>{setSig("gainers");setPage(1);}}>🟢 +</Btn>
        <Btn active={sig==="losers"}  onClick={()=>{setSig("losers"); setPage(1);}}>🔴 −</Btn>
        <Btn active={sig==="above"}   onClick={()=>{setSig("above");  setPage(1);}}>↑ VWAP</Btn>
        <Btn active={sig==="below"}   onClick={()=>{setSig("below");  setPage(1);}}>↓ VWAP</Btn>

        <input value={search} onChange={e=>{setSearch(e.target.value);setPage(1);}}
          placeholder="Search ticker or name…"
          style={{marginLeft:"auto",background:"rgba(255,255,255,.035)",
            border:"1px solid rgba(255,255,255,.07)",borderRadius:6,
            padding:"5px 12px",color:"#ccc",fontSize:11,outline:"none",
            width:175,fontFamily:"'Space Mono',monospace"}}/>
      </div>

      <div style={{fontSize:10,color:"#333",marginBottom:7}}>
        {loading&&stocks.length===0
          ? "⏳ First fetch running — loading all 170 stocks from yfinance…"
          : `Showing ${paged.length} of ${filtered.length} stocks`}
      </div>

      {/* ── table ── */}
      <div style={{background:"rgba(255,255,255,.012)",border:"1px solid rgba(255,255,255,.055)",borderRadius:12,overflow:"auto"}}>
        <table style={{width:"100%",borderCollapse:"collapse",minWidth:660}}>
          <thead>
            <tr style={{borderBottom:"1px solid rgba(255,255,255,.055)",background:"rgba(255,255,255,.018)"}}>
              <th style={{padding:"8px 10px",textAlign:"left",fontSize:9,color:"#383838",width:28}}>#</th>
              <Th label="Symbol / Name" k="symbol" align="left"/>
              <Th label="Price"   k="price"/>
              <Th label="Change"  k="change_pct"/>
              <Th label="VWAP"    k="vwap"/>
              <Th label="vs VWAP" k="price"/>
              <Th label="Volume"  k="volume"/>
              <th style={{padding:"8px 10px",textAlign:"center",fontSize:9,color:"#484848",textTransform:"uppercase",letterSpacing:"1px"}}>Signal</th>
              <th style={{padding:"8px 10px",textAlign:"right",fontSize:9,color:"#484848",textTransform:"uppercase",letterSpacing:"1px",width:56}}>Bar</th>
            </tr>
          </thead>
          <tbody>
            {loading&&stocks.length===0?(
              <tr><td colSpan={9} style={{padding:50,textAlign:"center",color:"#444"}}>
                <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:12}}>
                  <Spin/><span style={{fontSize:13}}>Fetching 170 stocks from Yahoo Finance via yfinance…</span>
                </div>
              </td></tr>
            ):paged.length===0?(
              <tr><td colSpan={9} style={{padding:40,textAlign:"center",color:"#444",fontSize:12}}>No stocks match your filters.</td></tr>
            ):paged.map((s,i)=><Row key={s.symbol} s={s} rank={(page-1)*PAGE+i+1}/>)}
          </tbody>
        </table>
      </div>

      {/* ── pagination ── */}
      {totalPgs>1&&(
        <div style={{display:"flex",justifyContent:"center",gap:7,marginTop:14,alignItems:"center",flexWrap:"wrap"}}>
          <button className="btn" onClick={()=>setPage(p=>Math.max(1,p-1))} disabled={page===1}
            style={{background:"rgba(255,255,255,.04)",border:"1px solid rgba(255,255,255,.07)",
              color:page===1?"#333":"#888",borderRadius:6,padding:"5px 14px",fontSize:11,opacity:page===1?.4:1}}>← Prev</button>
          {Array.from({length:totalPgs},(_,i)=>i+1).map(p=>(
            <button key={p} className="btn" onClick={()=>setPage(p)} style={{
              background:page===p?"rgba(0,255,150,.12)":"rgba(255,255,255,.028)",
              border:`1px solid rgba(${page===p?"0,255,150":"255,255,255"},${page===p?.28:.06})`,
              color:page===p?"#00ff96":"#555",borderRadius:6,padding:"5px 11px",
              fontSize:11,fontWeight:page===p?700:400}}>{p}</button>
          ))}
          <button className="btn" onClick={()=>setPage(p=>Math.min(totalPgs,p+1))} disabled={page===totalPgs}
            style={{background:"rgba(255,255,255,.04)",border:"1px solid rgba(255,255,255,.07)",
              color:page===totalPgs?"#333":"#888",borderRadius:6,padding:"5px 14px",
              fontSize:11,opacity:page===totalPgs?.4:1}}>Next →</button>
        </div>
      )}

      <p style={{fontSize:10,color:"#1e1e1e",marginTop:12,textAlign:"center"}}>
        Live data · Yahoo Finance via yfinance · 5-min VWAP + Volume · Educational use only
      </p>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
